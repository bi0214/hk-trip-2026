<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港聖誕之旅 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pk:#D4537E;--pk2:#FBEAF0;--pk3:#F4C0D1;
  --pr:#7F77DD;--pr2:#EEEDFE;--pr3:#CECBF6;
  --tl:#1D9E75;--tl2:#E1F5EE;--tl3:#9FE1CB;
  --am:#BA7517;--am2:#FAEEDA;--am3:#FAC775;
  --rd:#E24B4A;--rd2:#FCEBEB;
}
body{font-family:'Nunito',sans-serif;background:#fafafa;min-height:100vh;padding:1.5rem 1rem}
.app{max-width:680px;margin:0 auto}

/* sync bar */
.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:10px;transition:all .3s}
.sync-bar.ok{background:#E1F5EE;color:#085041}
.sync-bar.saving{background:#FAEEDA;color:#633806}
.sync-bar.err{background:#FCEBEB;color:#791F1F}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-bar.ok .sync-dot{background:#1D9E75}
.sync-bar.saving .sync-dot{background:#BA7517;animation:pulse .8s infinite}
.sync-bar.err .sync-dot{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* loading */
.loading{text-align:center;padding:3rem 1rem;color:#aaa;font-weight:700;font-size:15px}
.loading-spinner{font-size:28px;display:block;margin-bottom:10px;animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.banner{text-align:center;padding:1.5rem 1rem 1rem;background:linear-gradient(135deg,#FBEAF0 0%,#EEEDFE 50%,#E1F5EE 100%);border-radius:20px;margin-bottom:1rem;position:relative;overflow:hidden;border:1.5px solid #F4C0D1}
.banner-stars{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#D4537E}
.banner h1{font-size:22px;font-weight:800;color:#3C3489;margin-bottom:4px;letter-spacing:-.3px}
.banner p{font-size:13px;color:#7F77DD;font-weight:600}
.banner-icons{font-size:20px;margin-bottom:6px;letter-spacing:4px}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{flex:1;min-width:120px;padding:10px 4px;font-size:12px;font-weight:700;color:#666;background:#f5f5f5;border:1.5px solid #e0e0e0;cursor:pointer;border-radius:14px;transition:all .18s;font-family:'Nunito',sans-serif}
.tab:hover{transform:translateY(-1px)}
.tab.on-it{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.tab.on-tp{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.tab.on-lg{background:#FBEAF0;color:#72243E;border-color:#ED93B1}
.tab.on-in{background:#FAEEDA;color:#633806;border-color:#FAC775}
.info-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;padding:16px;margin-bottom:12px}
.info-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.info-card-title{font-size:14px;font-weight:800;color:#1a1a1a}
.info-field{margin-bottom:12px}
.info-label{font-size:11px;font-weight:800;color:#888;letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase}
.info-val{font-size:13px;font-weight:700;color:#1a1a1a;padding:9px 12px;background:#f5f5f5;border-radius:10px;min-height:38px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s;word-break:break-all}
.info-val:hover{border-color:#CECBF6}
.info-val.empty{color:#bbb;font-weight:600;font-style:italic}
.info-row{display:flex;gap:10px}
.info-row .info-field{flex:1;min-width:0}
.edit-inline-row{display:flex;gap:6px}
.day-card{border-radius:16px;margin-bottom:10px;overflow:hidden;border:1.5px solid #e0e0e0;background:#fff}
.day-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer}
.day-badge{font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-right:10px;letter-spacing:.3px}
.d0 .day-badge{background:#FBEAF0;color:#72243E}
.d1 .day-badge{background:#EEEDFE;color:#3C3489}
.d2 .day-badge{background:#E1F5EE;color:#085041}
.d3 .day-badge{background:#FAEEDA;color:#633806}
.day-name{font-size:14px;font-weight:700;color:#1a1a1a}
.day-date{font-size:12px;color:#666;font-weight:600}
.chev{font-size:11px;color:#666;transition:transform .2s;display:inline-block}
.day-body{padding:0 16px 14px;display:none}
.day-body.open{display:block}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;border-radius:2px}
.d0 .tl::before{background:#F4C0D1}.d1 .tl::before{background:#CECBF6}.d2 .tl::before{background:#9FE1CB}.d3 .tl::before{background:#FAC775}
.evt{position:relative;margin-bottom:12px}
.evt-dot{position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;border:2.5px solid;background:#fff}
.d0 .evt-dot{border-color:var(--pk)}.d1 .evt-dot{border-color:var(--pr)}.d2 .evt-dot{border-color:var(--tl)}.d3 .evt-dot{border-color:var(--am)}
.d0 .evt-dot.hl{background:var(--pk)}.d1 .evt-dot.hl{background:var(--pr)}.d2 .evt-dot.hl{background:var(--tl)}.d3 .evt-dot.hl{background:var(--am)}
.evt-time{font-size:11px;font-weight:700;letter-spacing:.3px}
.d0 .evt-time{color:var(--pk)}.d1 .evt-time{color:var(--pr)}.d2 .evt-time{color:var(--tl)}.d3 .evt-time{color:var(--am)}
.evt-name{font-size:13px;font-weight:700;color:#1a1a1a}
.evt-note{font-size:12px;color:#666;margin-top:2px;font-weight:600}
.evt-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.evt-acts{display:flex;gap:2px;flex-shrink:0;margin-top:2px;opacity:0;transition:opacity .15s}
.evt:hover .evt-acts{opacity:1}
.sb{font-size:12px;padding:3px 6px;border:none;border-radius:6px;background:transparent;color:#666;cursor:pointer}
.sb:hover{background:#f5f5f5}
.inp{font-size:13px;font-weight:600;padding:8px 11px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#1a1a1a;outline:none;width:100%;font-family:'Nunito',sans-serif}
.inp:focus{border-color:#7F77DD}
.sel{font-size:13px;font-weight:600;padding:8px 11px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#1a1a1a;outline:none;font-family:'Nunito',sans-serif}
.btn{font-size:12px;font-weight:700;padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .15s}
.btn:hover{background:#f5f5f5;transform:translateY(-1px)}
.btn-pk{background:var(--pk);color:white;border-color:var(--pk)}.btn-pk:hover{background:#993556}
.btn-pr{background:var(--pr);color:white;border-color:var(--pr)}.btn-pr:hover{background:#534AB7}
.btn-tl{background:var(--tl);color:white;border-color:var(--tl)}.btn-tl:hover{background:#0F6E56}
.btn-am{background:var(--am);color:white;border-color:var(--am)}
.btn-danger{color:#A32D2D;border-color:transparent;background:transparent}
.edit-form{background:#f5f5f5;border-radius:12px;padding:12px;margin-top:2px}
.add-form{border-radius:12px;padding:14px;margin-top:8px}
.d0 .add-form{background:var(--pk2);border:1.5px solid var(--pk3)}
.d1 .add-form{background:var(--pr2);border:1.5px solid var(--pr3)}
.d2 .add-form{background:var(--tl2);border:1.5px solid var(--tl3)}
.d3 .add-form{background:var(--am2);border:1.5px solid var(--am3)}
.add-form-label{font-size:12px;font-weight:800;margin-bottom:8px;letter-spacing:.3px}
.d0 .add-form-label{color:#72243E}.d1 .add-form-label{color:#3C3489}.d2 .add-form-label{color:#085041}.d3 .add-form-label{color:#633806}
.add-btn-full{width:100%;text-align:center;font-size:13px;font-weight:700;padding:10px;border-radius:12px;margin-top:8px;border-style:dashed;border-width:1.5px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.d0 .add-btn-full{border-color:var(--pk3);color:var(--pk);background:var(--pk2)}
.d1 .add-btn-full{border-color:var(--pr3);color:var(--pr);background:var(--pr2)}
.d2 .add-btn-full{border-color:var(--tl3);color:var(--tl);background:var(--tl2)}
.d3 .add-btn-full{border-color:var(--am3);color:var(--am);background:var(--am2)}
.tip-grp{margin-bottom:1.25rem}
.tip-cat{font-size:12px;font-weight:800;color:#666;margin-bottom:8px;padding-left:2px;letter-spacing:.4px}
.tip{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:#fff;border:1.5px solid #e0e0e0;border-radius:14px;margin-bottom:7px}
.tip:hover{border-color:#CECBF6}
.tip-t{font-size:13px;font-weight:700;color:#1a1a1a}
.tip-d{font-size:12px;color:#666;margin-top:3px;line-height:1.6;font-weight:600}
.prog-track{height:10px;border-radius:10px;background:var(--pk2);border:1.5px solid var(--pk3);margin-bottom:1rem;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--pk),var(--pr));transition:width .4s}
.prog-lbl{font-size:13px;font-weight:700;color:#666;margin-bottom:6px;display:flex;justify-content:space-between}
.prog-pct{font-size:12px;font-weight:800;color:var(--pk)}
.lug-cat{font-size:12px;font-weight:800;color:#666;margin-bottom:8px;padding-left:2px;letter-spacing:.4px}
.lug-sec{margin-bottom:1rem}
.item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;margin-bottom:6px;transition:all .15s}
.item:hover{border-color:#CECBF6}
.item.chk{opacity:.5}
.cb{width:18px;height:18px;border-radius:6px;border:2px solid #e0e0e0;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.item.chk .cb{background:var(--pk);border-color:var(--pk)}
.cm{display:none;color:white;font-size:11px;font-weight:800}
.item.chk .cm{display:block}
.il{font-size:13px;font-weight:600;color:#1a1a1a;flex:1;cursor:pointer}
.item.chk .il{text-decoration:line-through;color:#999}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px}
.tag-r{background:var(--rd2);color:#791F1F}
.tag-b{background:var(--pr2);color:#3C3489}
.tag-g{background:#f5f5f5;color:#666}
.item-acts{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.item:hover .item-acts{opacity:1}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading"><span class="loading-spinner">⏳</span>連線中，請稍候…</div>

const firebaseConfig = {
  databaseURL: 'https://hk-trip-2026-40710-default-rtdb.firebaseio.com'
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const tripRef = ref(db, 'trip');

    ]}
  ],
  luggage:{
    '證件 & 財務 💳':[{l:'台灣護照（確認有效期）',t:'必備',c:false},{l:'信用卡 / 金融卡',t:'必備',c:false},{l:'港幣現金',t:'必備',c:false},{l:'電子機票確認信',t:'必備',c:false},{l:'酒店訂房確認信',t:'必備',c:false}],
    '電子 & 通訊 📱':[{l:'手機 & 充電線',t:'必備',c:false},{l:'英式三腳轉接頭 (Type G)',t:'必備',c:false},{l:'行動電源',t:'建議',c:false},{l:'eSIM 或香港 SIM 卡',t:'建議',c:false},{l:'相機 & 記憶卡',t:'選配',c:false}],
    '衣物 & 配件 👗':[{l:'薄外套（室內冷氣強）',t:'建議',c:false},{l:'舒適步行鞋',t:'必備',c:false},{l:'換洗衣物 x4',t:'必備',c:false},{l:'雨傘或輕便雨衣',t:'建議',c:false}],
    '衛生 & 藥品 💊':[{l:'個人藥品（腸胃藥、感冒藥）',t:'建議',c:false},{l:'防曬乳',t:'建議',c:false},{l:'保濕 & 護唇膏（冬天乾燥）',t:'選配',c:false},{l:'口罩',t:'建議',c:false}],
    '迪士尼裝備 🏰':[{l:'迪士尼電子門票',t:'必備',c:false},{l:'舒適小背包',t:'建議',c:false},{l:'保溫瓶（樂園飲料好貴）',t:'選配',c:false},{l:'零食補充',t:'選配',c:false}]

  info:{

    budget:'',currency_rate:'',sim:'',other:''
  }

const TIPS=[
  {cat:'🏰 迪士尼樂園',items:[{i:'🎄',t:'聖誕遊行時間',d:'聖誕節前後通常每日多場遊行，建議提前 30-60 分鐘佔位，可查官網當日時刻表。'},{i:'🎆',t:'煙火表演',d:'煙火約在晚上 8-9 點，建議在「美國小鎮大街」末端或「明日世界」附近觀看，視野最佳。'},{i:'🎟',t:'提前購票',d:'聖誕節為旺季！強烈建議提前於官網購買門票，熱門時段可能售罄。'},{i:'📸',t:'拍照攻略',d:'聖誕裝飾集中在美國小鎮大街和城堡前，下午光線最佳，適合拍照留念。'}]},
  {cat:'🚇 交通 & 消費',items:[{i:'🚇',t:'八達通卡',d:'抵港後在機場買八達通，港鐵、巴士、便利商店全通用，離港前退卡可拿回餘額。'},{i:'✈',t:'機場快線',d:'最快進城方式，約 24 分鐘到香港站，也可提前一天在市區辦理登機手續。'},{i:'💳',t:'貨幣兌換',d:'港幣 (HKD) 為流通貨幣，建議準備現金。機場匯率較差，可在市區找換店換。'}]},
  {cat:'🌤 天氣 & 生活',items:[{i:'🧥',t:'12月天氣',d:'香港12月氣溫約 15-22°C，早晚偏涼。室內冷氣強，建議攜帶薄外套備用。'},{i:'🔌',t:'電源插頭',d:'香港使用英式三腳方形插頭 (Type G, 220V)，台灣電器一定要帶轉接頭！'},{i:'📡',t:'網路',d:'可在台灣出發前購買香港 eSIM，或在機場購買本地 SIM 卡，價格實惠。'},{i:'🗣',t:'語言',d:'當地主要語言為廣東話，但英文和普通話也通，景點工作人員多能溝通。'}]},
  {cat:'🍜 美食推薦',items:[{i:'🥐',t:'港式早茶',d:'必試蝦餃、燒賣、腸粉、蛋撻！推薦到老字號茶樓體驗，記得早去否則要等位。'},{i:'🥩',t:'燒臘與雲吞麵',d:'叉燒飯、燒鵝是港式經典，沿街小店品質往往很高，可以大膽嘗試！'}]}
];

const TIMES=['早上','上午','中午','下午','傍晚','晚上'];
function timeOpts(){
  let h='<option value="">選擇時間</option>';
  TIMES.forEach(t=>h+=`<option value="${t}">${t}</option>`);
  h+='<optgroup label="── 指定時間 ──">';
  for(let i=0;i<24;i++){['00','30'].forEach(m=>{const v=String(i).padStart(2,'0')+':'+m;h+=`<option value="${v}">${v}</option>`;});}
  h+='</optgroup>';return h;
}
const TIME_HTML=timeOpts();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// UI state (not synced)
const UI={tab:'itinerary',openDays:{1:true},editEvt:null,addForm:{},editItem:null,editInfo:null,syncStatus:'ok'};

// Data state (synced to Firebase)
let D = null;
let saveTimer = null;

function saveToFirebase(){
  UI.syncStatus='saving';
  renderSyncBar();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    set(tripRef, D).then(()=>{
      UI.syncStatus='ok';
      renderSyncBar();
    }).catch(()=>{
      UI.syncStatus='err';
      renderSyncBar();
    });
  }, 600);
}

function renderSyncBar(){
  const el=document.getElementById('sync-bar');
  if(!el)return;
  const labels={ok:'已同步 ☁️',saving:'儲存中…',err:'同步失敗，請檢查網路'};
  el.className='sync-bar '+UI.syncStatus;
  el.innerHTML=`<div class="sync-dot"></div>${labels[UI.syncStatus]}`;
}

function iField(key,label,placeholder){
  const v=(D.info&&D.info[key])||'';
  const isEdit=UI.editInfo===key;
  if(isEdit)return`<div class="info-field"><div class="info-label">${label}</div><div class="edit-inline-row"><input class="inp" id="if-${key}" value="${esc(v)}" placeholder="${placeholder}" onkeydown="if(event.key==='Enter')window.saveInfo('${key}')" style="flex:1"><button class="btn btn-am" style="font-size:11px;padding:5px 10px;white-space:nowrap" onclick="window.saveInfo('${key}')">存</button></div></div>`;
  return`<div class="info-field"><div class="info-label">${label}</div><div class="info-val ${v?'':'empty'}" onclick="window.editInfo('${key}')">${v?esc(v):placeholder}</div></div>`;
}

function render(){
  if(!D){return;}
  const a=document.getElementById('app');
  let h=`<div class="banner"><div class="banner-stars" id="bstars"></div><div class="banner-icons">✈ 🏰 🎆</div><h1>香港聖誕之旅 ✨</h1><p>12月24日 — 12月27日 · 2026</p></div>`;
  h+=`<div id="sync-bar" class="sync-bar ${UI.syncStatus}"><div class="sync-dot"></div>${UI.syncStatus==='ok'?'已同步 ☁️':UI.syncStatus==='saving'?'儲存中…':'同步失敗，請檢查網路'}</div>`;

  const tabCls=['on-it','on-tp','on-lg','on-in'];
  const tabs=[['itinerary','🗓 行程規劃'],['tips','📋 注意事項'],['luggage','🧳 行李清單'],['info','✈ 旅遊資訊']];
  h+='<div class="tabs">';
  tabs.forEach(([id,lbl],i)=>h+=`<button class="tab ${UI.tab===id?tabCls[i]:''}" onclick="window.setTab('${id}')">${lbl}</button>`);
  h+='</div>';

  if(UI.tab==='itinerary'){
    h+='<div>';
    D.days.forEach((day,di)=>{
      const op=!!UI.openDays[di];
      h+=`<div class="day-card ${day.dc}"><div class="day-h" onclick="window.togDay(${di})"><div style="display:flex;align-items:center"><span class="day-badge">${day.label}</span><div><div class="day-name">${day.name}</div><div class="day-date">${day.date}</div></div></div><span class="chev" style="transform:rotate(${op?180:0}deg)">▼</span></div><div class="day-body ${op?'open':''}"><div class="tl">`;
      day.events.forEach((ev,ei)=>{
        const isEdit=UI.editEvt===di+'-'+ei;
        h+=`<div class="evt"><div class="evt-dot ${ev.hl?'hl':''}"></div>`;
        if(isEdit){h+=`<div class="edit-form"><div style="display:flex;gap:6px;margin-bottom:7px"><select class="sel" id="ed-time" style="width:120px">${TIME_HTML}</select><input class="inp" id="ed-name" value="${esc(ev.name)}" placeholder="行程名稱"></div><input class="inp" id="ed-note" value="${esc(ev.note)}" placeholder="備註（可留空）" style="margin-bottom:8px"><div style="display:flex;gap:6px;align-items:center"><button class="btn btn-pr" style="font-size:11px;padding:5px 14px" onclick="window.saveEvt(${di},${ei})">儲存</button><button class="btn" style="font-size:11px;padding:5px 14px" onclick="window.cancelEdit()">取消</button><button class="btn btn-danger" style="font-size:11px;padding:5px 10px;margin-left:auto" onclick="window.delEvt(${di},${ei})">刪除</button></div></div>`;}
        else{h+=`<div class="evt-row"><div style="flex:1"><div class="evt-time">${esc(ev.time)}</div><div class="evt-name">${esc(ev.name)}</div>${ev.note?'<div class="evt-note">'+esc(ev.note)+'</div>':''}</div><div class="evt-acts"><button class="sb" onclick="window.editEvt(${di},${ei})">✏️</button><button class="sb" onclick="window.delEvt(${di},${ei})">🗑️</button></div></div>`;}
        h+='</div>';
      });
      h+='</div>';
      if(UI.addForm[di]){h+=`<div class="add-form"><div class="add-form-label">新增行程</div><div style="display:flex;gap:6px;margin-bottom:7px"><select class="sel" id="add-time-${di}" style="width:120px">${TIME_HTML}</select><input class="inp" id="add-name-${di}" placeholder="行程名稱"></div><input class="inp" id="add-note-${di}" placeholder="備註（可留空）" style="margin-bottom:8px"><div style="display:flex;gap:6px"><button class="btn ${di===0?'btn-pk':di===1?'btn-pr':di===2?'btn-tl':'btn-am'}" style="font-size:11px;padding:6px 14px" onclick="window.addEvt(${di})">加入行程</button><button class="btn" style="font-size:11px;padding:6px 14px" onclick="window.togAdd(${di})">取消</button></div></div>`;}
      else{h+=`<button class="btn add-btn-full" onclick="window.togAdd(${di})">+ 新增行程</button>`;}
      h+='</div></div>';
    });
    h+='</div>';
  }

  if(UI.tab==='info'){
    h+=`<div class="info-card"><div class="info-card-hdr"><span style="font-size:18px">✈</span><div class="info-card-title">去程航班</div></div><div class="info-row">${iField('flight_out_date','日期','12月24日')}${iField('flight_out_num','航班號','例：CI916')}</div><div class="info-row">${iField('flight_out_dep','出發時間','例：08:30')}${iField('flight_out_arr','抵達時間','例：10:30')}</div></div>`;
    h+=`<div class="info-card"><div class="info-card-hdr"><span style="font-size:18px">🛬</span><div class="info-card-title">回程航班</div></div><div class="info-row">${iField('flight_ret_date','日期','12月27日')}${iField('flight_ret_num','航班號','例：CI917')}</div><div class="info-row">${iField('flight_ret_dep','出發時間','例：14:00')}${iField('flight_ret_arr','抵達時間','例：16:00')}</div></div>`;
    h+=`<div class="info-card"><div class="info-card-hdr"><span style="font-size:18px">🏨</span><div class="info-card-title">住宿資訊</div></div>${iField('hotel_name','飯店名稱','點擊填寫飯店名稱')}${iField('hotel_addr','地址','點擊填寫地址')}<div class="info-row">${iField('hotel_checkin','入住日期','12月24日')}${iField('hotel_checkout','退房日期','12月27日')}</div>${iField('hotel_phone','聯絡電話','點擊填寫飯店電話')}</div>`;
    h+=`<div class="info-card"><div class="info-card-hdr"><span style="font-size:18px">💡</span><div class="info-card-title">其他資訊</div></div><div class="info-row">${iField('budget','旅遊預算','例：20000 台幣')}${iField('currency_rate','匯率參考','例：1 HKD ≈ 4.1 TWD')}</div>${iField('sim','網路 SIM / eSIM','點擊填寫 SIM 卡資訊')}${iField('other','備忘','點擊填寫其他備忘')}</div>`;
    h+=`<p style="font-size:12px;color:#bbb;text-align:center;font-weight:600;margin-top:4px">點擊任意欄位即可編輯，自動同步給所有旅伴 ✈</p>`;
  }

  if(UI.tab==='tips'){
    TIPS.forEach(g=>{h+=`<div class="tip-grp"><div class="tip-cat">${g.cat}</div>`;g.items.forEach(t=>{h+=`<div class="tip"><span style="font-size:16px;flex-shrink:0;margin-top:1px">${t.i}</span><div><div class="tip-t">${t.t}</div><div class="tip-d">${t.d}</div></div></div>`;});h+='</div>';});
  }

  if(UI.tab==='luggage'){
    const all=Object.values(D.luggage).flat();
    const total=all.length,done=all.filter(i=>i.c).length,pct=total?Math.round(done/total*100):0;
    h+=`<div class="prog-lbl"><span>行李打包進度</span><span class="prog-pct">${done}/${total} 項 · ${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>`;
    Object.entries(D.luggage).forEach(([cat,items])=>{
      h+=`<div class="lug-sec"><div class="lug-cat">${cat}</div>`;
      items.forEach((it,idx)=>{
        const isEdit=UI.editItem===cat+'-'+idx;
        const tc=it.t==='必備'?'tag-r':it.t==='建議'?'tag-b':'tag-g';
        h+=`<div class="item ${it.c?'chk':''}">`;
        if(isEdit){h+=`<div style="display:flex;gap:6px;flex:1;align-items:center"><input class="inp" id="ei-label" value="${esc(it.l)}" style="flex:1"><button class="btn btn-pk" style="font-size:11px;padding:5px 10px" onclick="window.saveItem('${esc(cat)}',${idx})">存</button><button class="btn" style="font-size:11px;padding:5px 10px" onclick="window.cancelItemEdit()">取消</button></div>`;}
        else{h+=`<div class="cb" onclick="window.togItem('${esc(cat)}',${idx})"><span class="cm">✓</span></div><span class="il" onclick="window.togItem('${esc(cat)}',${idx})">${esc(it.l)}</span>${it.t?'<span class="tag '+tc+'">'+it.t+'</span>':''}<div class="item-acts"><button class="sb" onclick="window.editItem('${esc(cat)}',${idx})">✏️</button><button class="sb" onclick="window.delItem('${esc(cat)}',${idx})">🗑️</button></div>`;}
        h+='</div>';
      });
      h+='</div>';
    });
    h+=`<div style="display:flex;gap:8px;margin-top:10px"><input class="inp" id="new-item" placeholder="新增自訂物品..." onkeydown="if(event.key==='Enter')window.addItem()" style="flex:1"><button class="btn btn-pk" onclick="window.addItem()">+ 新增</button></div>`;
  }

  a.innerHTML=h;

  // stars
  const bs=document.getElementById('bstars');
  if(bs){for(let i=0;i<18;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*6+3;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*.2+.05}`;bs.appendChild(s);}}

  // restore select for edit
  if(UI.editEvt!==null){
    const el=document.getElementById('ed-time');
    if(el){const[di,ei]=UI.editEvt.split('-').map(Number);const cur=D.days[di].events[ei].time;let found=false;for(let o of el.options)if(o.value===cur){found=true;break;}if(!found){const opt=document.createElement('option');opt.value=cur;opt.text=cur;el.insertBefore(opt,el.options[1]);}el.value=cur;}
  }
}

// Listen to Firebase — renders whenever data changes from any device
onValue(tripRef, snap=>{
  const val=snap.val();
  if(val){
    D=val;
    // ensure info object exists
    if(!D.info)D.info=Object.assign({},DEFAULT.info);
  } else {
    // First time — write defaults
    D=JSON.parse(JSON.stringify(DEFAULT));
    set(tripRef,D);
  }
  render();
});

// Window handlers
window.setTab=t=>{UI.tab=t;render()};
window.togDay=i=>{UI.openDays[i]=!UI.openDays[i];render()};
window.togAdd=i=>{UI.addForm[i]=!UI.addForm[i];render()};

window.addEvt=di=>{
  const time=document.getElementById('add-time-'+di).value||'自訂';
  const name=document.getElementById('add-name-'+di).value.trim();
  const note=document.getElementById('add-note-'+di).value.trim();
  if(!name)return;
  D.days[di].events.push({time,name,note,hl:false});
  UI.addForm[di]=false;UI.openDays[di]=true;
  saveToFirebase();render();
};

window.editEvt=(di,ei)=>{UI.editEvt=di+'-'+ei;render()};
window.cancelEdit=()=>{UI.editEvt=null;render()};
window.saveEvt=(di,ei)=>{
  const time=document.getElementById('ed-time').value||D.days[di].events[ei].time;
  const name=document.getElementById('ed-name').value.trim();
  const note=document.getElementById('ed-note').value.trim();
  if(!name)return;
  D.days[di].events[ei]={...D.days[di].events[ei],time,name,note};
  UI.editEvt=null;saveToFirebase();render();
};
window.delEvt=(di,ei)=>{D.days[di].events.splice(ei,1);UI.editEvt=null;saveToFirebase();render()};

window.togItem=(cat,idx)=>{D.luggage[cat][idx].c=!D.luggage[cat][idx].c;saveToFirebase();render()};
window.editItem=(cat,idx)=>{UI.editItem=cat+'-'+idx;render()};
window.cancelItemEdit=()=>{UI.editItem=null;render()};
window.saveItem=(cat,idx)=>{
  const v=document.getElementById('ei-label').value.trim();
  if(!v)return;D.luggage[cat][idx].l=v;UI.editItem=null;saveToFirebase();render();
};
window.delItem=(cat,idx)=>{
  D.luggage[cat].splice(idx,1);
  if(D.luggage[cat].length===0)delete D.luggage[cat];
  UI.editItem=null;saveToFirebase();render();
};
window.addItem=()=>{
  const el=document.getElementById('new-item');
  const v=el.value.trim();if(!v)return;
  if(!D.luggage['自訂物品 ⭐'])D.luggage['自訂物品 ⭐']=[];
  D.luggage['自訂物品 ⭐'].push({l:v,t:'',c:false});
  saveToFirebase();render();
};

window.editInfo=k=>{UI.editInfo=k;render();setTimeout(()=>{const el=document.getElementById('if-'+k);if(el){el.focus();el.select();}},30);};
window.saveInfo=k=>{
  const el=document.getElementById('if-'+k);
  if(el){if(!D.info)D.info={};D.info[k]=el.value.trim();}
  UI.editInfo=null;saveToFirebase();render();
};
</script>
</body>
