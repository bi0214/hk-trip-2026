<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港聖誕之旅 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pk:#D4537E;--pk2:#FBEAF0;--pk3:#F4C0D1;
  --pr:#7F77DD;--pr2:#EEEDFE;--pr3:#CECBF6;
  --tl:#1D9E75;--tl2:#E1F5EE;--tl3:#9FE1CB;
  --am:#BA7517;--am2:#FAEEDA;--am3:#FAC775;
  --rd:#E24B4A;--rd2:#FCEBEB;
}
body{font-family:'Nunito',sans-serif;background:#fff5f8;min-height:100vh;padding:1rem;position:relative;overflow-x:hidden}
.xmas-bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.snowflake{position:absolute;top:-40px;color:#D4537E;opacity:.18;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
.xmas-lights{position:fixed;top:0;left:0;right:0;height:28px;display:flex;align-items:flex-end;padding:0 8px;z-index:10;pointer-events:none}
.light-wire{flex:1;height:2px;background:#2d2d2d;position:relative;top:-6px}
.bulb{width:10px;height:14px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;flex-shrink:0;animation:blink 2s ease-in-out infinite}
.bulb::after{content:'';display:block;width:4px;height:4px;background:#2d2d2d;border-radius:1px;margin:0 auto;margin-top:-4px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
.bulb:nth-child(4n+1){background:#E24B4A;animation-delay:0s}
.bulb:nth-child(4n+2){background:#1D9E75;animation-delay:.3s}
.bulb:nth-child(4n+3){background:#FAC775;animation-delay:.6s}
.bulb:nth-child(4n+0){background:#7F77DD;animation-delay:.9s}
.app{max-width:900px;margin:0 auto;position:relative;z-index:1;padding-top:32px}
.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:8px;transition:all .3s}
.sync-bar.ok{background:#E1F5EE;color:#085041}.sync-bar.saving{background:#FAEEDA;color:#633806}.sync-bar.err{background:#FCEBEB;color:#791F1F}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-bar.ok .sync-dot{background:#1D9E75}.sync-bar.saving .sync-dot{background:#BA7517;animation:pulse .8s infinite}.sync-bar.err .sync-dot{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading{text-align:center;padding:3rem 1rem;color:#aaa;font-weight:700}
.loading-spinner{font-size:28px;display:block;margin-bottom:10px;animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.banner{text-align:center;padding:1.2rem 1rem 1rem;background:linear-gradient(135deg,#FBEAF0 0%,#EEEDFE 50%,#E1F5EE 100%);border-radius:20px;margin-bottom:1rem;position:relative;overflow:hidden;border:1.5px solid #F4C0D1}
.banner h1{font-size:20px;font-weight:800;color:#3C3489;margin-bottom:2px}
.banner p{font-size:12px;color:#7F77DD;font-weight:600}
.banner-trees{font-size:22px;letter-spacing:6px;margin-bottom:4px}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:9px 4px;font-size:11px;font-weight:700;color:#666;background:#fff;border:1.5px solid #e0e0e0;cursor:pointer;border-radius:12px;transition:all .15s;font-family:'Nunito',sans-serif;text-align:center}
.tab:hover{transform:translateY(-2px)}
.tab.on-it{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.tab.on-tp{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.tab.on-lg{background:#FBEAF0;color:#72243E;border-color:#ED93B1}
.tab.on-in{background:#FAEEDA;color:#633806;border-color:#FAC775}
.tab.on-wb{background:#F0FFFE;color:#0B5E5A;border-color:#5DCFCB}
.tab.on-pb{background:#F5F0FF;color:#3D1B8E;border-color:#9B7FE0}
.inp{font-size:13px;font-weight:600;padding:8px 11px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#1a1a1a;outline:none;width:100%;font-family:'Nunito',sans-serif}
.inp:focus{border-color:#7F77DD}
.sel{font-size:13px;font-weight:600;padding:8px 11px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#1a1a1a;outline:none;font-family:'Nunito',sans-serif}
.btn{font-size:12px;font-weight:700;padding:8px 16px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;color:#1a1a1a;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .15s}
.btn:hover{background:#f5f5f5;transform:translateY(-1px)}
.btn-pk{background:var(--pk);color:#fff;border-color:var(--pk)}.btn-pk:hover{background:#993556}
.btn-pr{background:var(--pr);color:#fff;border-color:var(--pr)}.btn-pr:hover{background:#534AB7}
.btn-tl{background:var(--tl);color:#fff;border-color:var(--tl)}.btn-tl:hover{background:#0F6E56}
.btn-am{background:var(--am);color:#fff;border-color:var(--am)}
.btn-cy{background:#1AAEAA;color:#fff;border-color:#1AAEAA}.btn-cy:hover{background:#0E7E7B}
.btn-vl{background:#6C4FC4;color:#fff;border-color:#6C4FC4}.btn-vl:hover{background:#4D37A0}
.btn-danger{color:#A32D2D;border-color:transparent;background:transparent}
.sb{font-size:12px;padding:3px 6px;border:none;border-radius:6px;background:transparent;color:#999;cursor:pointer}
.sb:hover{background:#f5f5f5}

/* ── 行程 ── */
.day-card{border-radius:16px;margin-bottom:10px;overflow:hidden;border:1.5px solid #e0e0e0;background:#fff}
.day-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer}
.day-badge{font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-right:10px}
.d0 .day-badge{background:#FBEAF0;color:#72243E}.d1 .day-badge{background:#EEEDFE;color:#3C3489}
.d2 .day-badge{background:#E1F5EE;color:#085041}.d3 .day-badge{background:#FAEEDA;color:#633806}
.day-name{font-size:14px;font-weight:700;color:#1a1a1a}
.day-date{font-size:12px;color:#666;font-weight:600}
.chev{font-size:11px;color:#666;transition:transform .2s;display:inline-block}
.day-body{padding:0 16px 14px;display:none}.day-body.open{display:block}
.tl{position:relative;padding-left:22px}
.tl::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;border-radius:2px}
.d0 .tl::before{background:#F4C0D1}.d1 .tl::before{background:#CECBF6}.d2 .tl::before{background:#9FE1CB}.d3 .tl::before{background:#FAC775}
.evt{position:relative;margin-bottom:12px}
.evt-dot{position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;border:2.5px solid;background:#fff}
.d0 .evt-dot{border-color:var(--pk)}.d1 .evt-dot{border-color:var(--pr)}.d2 .evt-dot{border-color:var(--tl)}.d3 .evt-dot{border-color:var(--am)}
.d0 .evt-dot.hl{background:var(--pk)}.d1 .evt-dot.hl{background:var(--pr)}.d2 .evt-dot.hl{background:var(--tl)}.d3 .evt-dot.hl{background:var(--am)}
.evt-time{font-size:11px;font-weight:700;letter-spacing:.3px}
.d0 .evt-time{color:var(--pk)}.d1 .evt-time{color:var(--pr)}.d2 .evt-time{color:var(--tl)}.d3 .evt-time{color:var(--am)}
.evt-name{font-size:13px;font-weight:700;color:#1a1a1a}
.evt-note{font-size:12px;color:#666;margin-top:2px;font-weight:600}
.evt-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.evt-acts{display:flex;gap:2px;flex-shrink:0;margin-top:2px;opacity:0;transition:opacity .15s}
.evt:hover .evt-acts{opacity:1}
.edit-form{background:#f8f8f8;border-radius:12px;padding:12px;margin-top:2px;border:1.5px solid #eee}
.add-form{border-radius:12px;padding:14px;margin-top:8px}
.d0 .add-form{background:var(--pk2);border:1.5px solid var(--pk3)}.d1 .add-form{background:var(--pr2);border:1.5px solid var(--pr3)}
.d2 .add-form{background:var(--tl2);border:1.5px solid var(--tl3)}.d3 .add-form{background:var(--am2);border:1.5px solid var(--am3)}
.add-form-label{font-size:12px;font-weight:800;margin-bottom:8px}
.d0 .add-form-label{color:#72243E}.d1 .add-form-label{color:#3C3489}.d2 .add-form-label{color:#085041}.d3 .add-form-label{color:#633806}
.add-btn-full{width:100%;text-align:center;font-size:13px;font-weight:700;padding:10px;border-radius:12px;margin-top:8px;border-style:dashed;border-width:1.5px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.d0 .add-btn-full{border-color:var(--pk3);color:var(--pk);background:var(--pk2)}.d1 .add-btn-full{border-color:var(--pr3);color:var(--pr);background:var(--pr2)}
.d2 .add-btn-full{border-color:var(--tl3);color:var(--tl);background:var(--tl2)}.d3 .add-btn-full{border-color:var(--am3);color:var(--am);background:var(--am2)}

/* ── 注意事項 ── */
.tip-grp{margin-bottom:1.25rem}
.tip-cat{font-size:12px;font-weight:800;color:#888;margin-bottom:8px;padding-left:2px;letter-spacing:.4px}
.tip{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:#fff;border:1.5px solid #e0e0e0;border-radius:14px;margin-bottom:7px;transition:border-color .15s}
.tip:hover{border-color:#CECBF6}
.tip-i{font-size:16px;flex-shrink:0;margin-top:1px}
.tip-t{font-size:13px;font-weight:700;color:#1a1a1a}
.tip-d{font-size:12px;color:#666;margin-top:3px;line-height:1.6;font-weight:600}
.tip-acts{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s;margin-left:4px}
.tip:hover .tip-acts{opacity:1}
.tip-add-form{background:#EEEDFE;border:1.5px solid #CECBF6;border-radius:14px;padding:14px;margin-bottom:10px}
.tip-add-btn{width:100%;text-align:center;font-size:13px;font-weight:700;padding:10px;border-radius:12px;border:1.5px dashed #CECBF6;cursor:pointer;font-family:'Nunito',sans-serif;background:#EEEDFE;color:#7F77DD;margin-bottom:1.25rem;transition:all .15s}
.tip-warning{background:#FCEBEB;border:1.5px solid #F09595;border-radius:14px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.tip-warning .tip-t{color:#791F1F}.tip-warning .tip-d{color:#A32D2D}

/* ── 行李 ── */
.prog-track{height:10px;border-radius:10px;background:var(--pk2);border:1.5px solid var(--pk3);margin-bottom:1rem;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--pk),var(--pr));transition:width .4s}
.prog-lbl{font-size:13px;font-weight:700;color:#666;margin-bottom:6px;display:flex;justify-content:space-between}
.prog-pct{font-size:12px;font-weight:800;color:var(--pk)}
.lug-cat{font-size:12px;font-weight:800;color:#888;margin-bottom:8px;padding-left:2px;letter-spacing:.4px}
.lug-sec{margin-bottom:1rem}
.item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;margin-bottom:6px;transition:all .15s}
.item:hover{border-color:#CECBF6}.item.chk{opacity:.5}
.cb{width:18px;height:18px;border-radius:6px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.item.chk .cb{background:var(--pk);border-color:var(--pk)}
.cm{display:none;color:white;font-size:11px;font-weight:800}.item.chk .cm{display:block}
.il{font-size:13px;font-weight:600;color:#1a1a1a;flex:1;cursor:pointer}.item.chk .il{text-decoration:line-through;color:#999}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px}
.tag-r{background:var(--rd2);color:#791F1F}.tag-b{background:var(--pr2);color:#3C3489}.tag-g{background:#f5f5f5;color:#666}
.item-acts{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}.item:hover .item-acts{opacity:1}

/* ── 旅遊資訊 ── */
.info-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;padding:16px;margin-bottom:12px}
.info-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.info-card-title{font-size:14px;font-weight:800;color:#1a1a1a}
.info-field{margin-bottom:12px}
.info-label{font-size:11px;font-weight:800;color:#888;letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase}
.info-val{font-size:13px;font-weight:700;color:#1a1a1a;padding:9px 12px;background:#f5f5f5;border-radius:10px;min-height:38px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s;word-break:break-all}
.info-val:hover{border-color:#CECBF6}.info-val.empty{color:#bbb;font-weight:600;font-style:italic}
.info-row{display:flex;gap:10px}.info-row .info-field{flex:1;min-width:0}
.edit-inline-row{display:flex;gap:6px}

/* ── 願望清單 ── */
.wb-tabs{display:flex;gap:6px;margin-bottom:12px}
.wb-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:700;color:#666;background:#f5f5f5;border:1.5px solid #e0e0e0;cursor:pointer;border-radius:10px;transition:all .15s;font-family:'Nunito',sans-serif;text-align:center}
.wb-tab.on-rest{background:#FFF3E8;color:#8B3A00;border-color:#FFC078}
.wb-tab.on-stay{background:#E8F4FF;color:#0A3E6E;border-color:#78B6FF}
.wb-tab.on-fun{background:#F0FFF4;color:#0B5E2A;border-color:#5DD67E}
.wish-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:grab;transition:all .15s;position:relative}
.wish-card:hover{border-color:#9B7FE0;transform:translateY(-2px);box-shadow:0 4px 12px rgba(107,79,196,.12)}
.wish-card.dragging{opacity:.4;transform:scale(.97)}
.wish-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
.wb-rest .wish-badge{background:#FFF3E8;color:#8B3A00}
.wb-stay .wish-badge{background:#E8F4FF;color:#0A3E6E}
.wb-fun .wish-badge{background:#F0FFF4;color:#0B5E2A}
.wish-name{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.wish-addr{font-size:11px;color:#888;font-weight:600;margin-bottom:2px}
.wish-note{font-size:11px;color:#aaa;font-weight:600}
.wish-acts{display:flex;gap:4px;margin-top:8px}
.wish-add-form{background:#F5F0FF;border:1.5px solid #CECBF6;border-radius:14px;padding:14px;margin-bottom:12px}
.wish-empty{text-align:center;padding:2rem 1rem;color:#ccc;font-weight:700;font-size:13px}

/* ── 拼圖行程板 ── */
.pb-layout{display:flex;gap:12px;align-items:flex-start}
.pb-pool{width:220px;flex-shrink:0}
.pb-pool-title{font-size:12px;font-weight:800;color:#6C4FC4;margin-bottom:8px;padding-left:2px;letter-spacing:.3px}
.pb-board{flex:1;min-width:0}
.pb-day-col{background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;margin-bottom:10px;overflow:hidden}
.pb-day-hdr{padding:10px 14px;font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px}
.pb-d0 .pb-day-hdr{background:#FBEAF0;color:#72243E}
.pb-d1 .pb-day-hdr{background:#EEEDFE;color:#3C3489}
.pb-d2 .pb-day-hdr{background:#E1F5EE;color:#085041}
.pb-d3 .pb-day-hdr{background:#FAEEDA;color:#633806}
.pb-slots{min-height:60px;padding:8px}
.pb-slot{border:2px dashed #e0e0e0;border-radius:10px;padding:6px;margin-bottom:6px;min-height:48px;transition:border-color .15s;position:relative}
.pb-slot.drag-over{border-color:#6C4FC4;background:#F5F0FF}
.pb-slot-time{font-size:10px;font-weight:800;color:#aaa;margin-bottom:4px;padding:0 2px}
.pb-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:8px 10px;cursor:grab;transition:all .15s;position:relative}
.pb-card:hover{border-color:#9B7FE0;box-shadow:0 3px 10px rgba(107,79,196,.12)}
.pb-card.dragging{opacity:.4}
.pb-card-type{font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;display:inline-block;margin-bottom:4px}
.pb-card-rest{background:#FFF3E8;color:#8B3A00}
.pb-card-stay{background:#E8F4FF;color:#0A3E6E}
.pb-card-fun{background:#F0FFF4;color:#0B5E2A}
.pb-card-plan{background:#EEEDFE;color:#3C3489}
.pb-card-name{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.pb-card-time{font-size:10px;color:#888;font-weight:600}
.pb-card-addr{font-size:10px;color:#aaa;font-weight:600}
.pb-card-note{font-size:10px;color:#aaa;font-weight:600;margin-top:1px}
.pb-card-del{position:absolute;top:5px;right:5px;font-size:11px;padding:2px 4px;border:none;border-radius:4px;background:transparent;color:#ccc;cursor:pointer;opacity:0;transition:opacity .15s}
.pb-card:hover .pb-card-del{opacity:1}
.pb-card-del:hover{color:#E24B4A;background:#FCEBEB}
.pool-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:8px 10px;cursor:grab;margin-bottom:6px;transition:all .15s}
.pool-card:hover{border-color:#9B7FE0;box-shadow:0 3px 10px rgba(107,79,196,.12);transform:translateY(-1px)}
.pool-card.dragging{opacity:.4}
.pool-card-type{font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;display:inline-block;margin-bottom:3px}
.pool-empty{text-align:center;padding:1.5rem .5rem;color:#ccc;font-weight:700;font-size:12px;border:2px dashed #eee;border-radius:12px}
.pb-add-slot-btn{width:100%;font-size:11px;font-weight:700;padding:6px;border:1.5px dashed #e0e0e0;border-radius:8px;background:transparent;color:#aaa;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;margin-top:2px}
.pb-add-slot-btn:hover{border-color:#9B7FE0;color:#6C4FC4;background:#F5F0FF}
.drag-over-inner{background:#F5F0FF;border-radius:8px;outline:2px dashed #9B7FE0}
@media(max-width:600px){.pb-layout{flex-direction:column}.pb-pool{width:100%}}
</style>
</head>
<body>
<div class="xmas-lights" id="lights"></div>
<div class="xmas-bg" id="xmas-bg"></div>
<div class="app" id="app">
  <div class="loading"><span class="loading-spinner">⏳</span>連線中，請稍候…</div>
</div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,onValue,set}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const app=initializeApp({databaseURL:'https://hk-trip-2026-40710-default-rtdb.firebaseio.com'});
const db=getDatabase(app);
const tripRef=ref(db,'trip');

const DEFAULT={
  days:[
    {label:'DAY 1',name:'抵達香港',date:'12月24日・聖誕夜',dc:'d0',events:[
      {time:'抵港後',name:'辦理入境 & 購買八達通',note:'在機場服務台購買',hl:false},
      {time:'下午',name:'搭乘機場快線入市區',note:'約 24 分鐘到香港站',hl:false},
      {time:'傍晚',name:'入住酒店、整理行李',note:'',hl:false},
      {time:'晚上',name:'聖誕夜市區逛街',note:'尖沙咀、銅鑼灣有超美聖誕燈飾！',hl:true}
    ]},
    {label:'DAY 2',name:'迪士尼樂園',date:'12月25日・聖誕節！！！',dc:'d1',events:[
      {time:'早上',name:'悠閒早餐，睡飽再出發',note:'不趕開園，我們下午才入園',hl:false},
      {time:'中午',name:'午餐後前往迪士尼',note:'搭港鐵迪士尼線，超方便',hl:false},

const TIMES=['早上','上午','中午','下午','傍晚','晚上'];
function timeOpts(){let h='<option value="">選擇時間</option>';TIMES.forEach(t=>h+=`<option value="${t}">${t}</option>`);h+='<optgroup label="── 指定時間 ──">';for(let i=0;i<24;i++){['00','30'].forEach(m=>{const v=String(i).padStart(2,'0')+':'+m;h+=`<option value="${v}">${v}</option>`;});}h+='</optgroup>';return h;}
const TIME_HTML=timeOpts();
function slotTimeForm(selectId){
  return`<select class="sel" id="${selectId}" style="width:100%;margin-bottom:5px" onchange="if(this.value)document.getElementById('c-${selectId}').value=''">${TIME_HTML}</select><input class="inp" id="c-${selectId}" placeholder="或自訂（例：抵港後、登機前）" style="font-size:12px;margin-bottom:6px" oninput="if(this.value)document.getElementById('${selectId}').value=''">`;
}
function getSlotVal(selectId){
  const c=document.getElementById('c-'+selectId);
  if(c&&c.value.trim())return c.value.trim();
  const s=document.getElementById(selectId);
  return s?s.value:'';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* xmas */
function initXmas(){
  const bg=document.getElementById('xmas-bg');
  ['❄','❅','❆','✦','✧','⭐','🌟'].forEach((s,i)=>{
    for(let j=0;j<3;j++){const el=document.createElement('div');el.className='snowflake';el.textContent=s;const sz=Math.random()*10+8;el.style.cssText=`left:${Math.random()*100}%;font-size:${sz}px;animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*8}s;opacity:${Math.random()*.18+.04}`;bg.appendChild(el);}
  });
  const lEl=document.getElementById('lights');const colors=['#E24B4A','#1D9E75','#FAC775','#7F77DD','#D4537E'];let lh='';
  for(let i=0;i<32;i++){lh+=`<div class="bulb" style="background:${colors[i%colors.length]};animation-delay:${(i*.12).toFixed(2)}s"></div>`;if(i<31)lh+=`<div class="light-wire"></div>`;}
  lEl.innerHTML=lh;
}
initXmas();

onValue(tripRef,snap=>{
  const val=snap.val();
  if(val){D=val;if(!D.info)D.info={...DEFAULT.info};if(!D.tips)D.tips=DEFAULT.tips;if(!D.wishlist)D.wishlist={rest:[],stay:[],fun:[]};if(!D.puzzle)D.puzzle={slots:JSON.parse(JSON.stringify(DEFAULT.puzzle.slots))};}
  else{D=JSON.parse(JSON.stringify(DEFAULT));set(tripRef,D);}
  render();
});

  if(metroEl&&metroEl.value.trim())item.metro=metroEl.value.trim();
  if(hoursEl&&hoursEl.value.trim())item.hours=hoursEl.value.trim();
  if(gmapsEl&&gmapsEl.value.trim())item.gmaps=gmapsEl.value.trim();
  if(UI.wbCat==='stay'){
    const ne=document.getElementById('w-nights');
    const ro=document.getElementById('w-rooms');
    const pe=document.getElementById('w-price');
    if(ne&&ne.value)item.nights=ne.value;
    if(ro&&ro.value)item.rooms=ro.value;
    if(pe&&pe.value)item.price=pe.value;
  }
  if(!D.wishlist[UI.wbCat])D.wishlist[UI.wbCat]=[];
  D.wishlist[UI.wbCat].push(item);UI.showWishAdd=false;save();render();
};
window.editWish=(cat,wi)=>{UI.editWish=cat+'-'+wi;UI.showWishAdd=false;render()};
window.cancelWishEdit=()=>{UI.editWish=null;render()};
window.saveWish=(cat,wi)=>{
  const name=document.getElementById('ew-name').value.trim();if(!name)return;
  const addr=document.getElementById('ew-addr').value.trim();
  const note=document.getElementById('ew-note').value.trim();
  const item={...D.wishlist[cat][wi],name,addr,note};
  const me=document.getElementById('ew-metro');
  const he=document.getElementById('ew-hours');
  const ge=document.getElementById('ew-gmaps');
  item.metro=me?me.value.trim():'';
  item.hours=he?he.value.trim():'';
  item.gmaps=ge?ge.value.trim():'';
  if(cat==='stay'){
    const ne=document.getElementById('ew-nights');
    const re2=document.getElementById('ew-rooms');
    const pe=document.getElementById('ew-price');
    item.nights=ne&&ne.value?ne.value:'';
    item.rooms=re2&&re2.value?re2.value:'';
    item.price=pe&&pe.value?pe.value:'';
  }
  D.wishlist[cat][wi]=item;
  UI.editWish=null;save();render();
};
window.delWish=(cat,idx)=>{D.wishlist[cat].splice(idx,1);UI.editWish=null;save();render()};
window.moveWishToPuzzle=(cat,idx)=>{
  const w=D.wishlist[cat][idx];
  if(!D.puzzle)D.puzzle={slots:JSON.parse(JSON.stringify(DEFAULT.puzzle.slots))};
  // add to first slot of day 0 by default
  const card={type:cat,name:w.name,addr:w.addr||'',note:w.note||'',time:''};
  D.puzzle.slots[0].cards=D.puzzle.slots[0].cards||[];
  D.puzzle.slots[0].cards.push(card);
  D.wishlist[cat].splice(idx,1);
  save();render();
  UI.tab='puzzle';render();
};

/* drag from pool (day events) */
window.onPoolDragStart=(e,dataStr)=>{e.dataTransfer.setData('pool',dataStr);e.currentTarget.classList.add('dragging');};
/* drag from wishlist */
window.onWishDragStart=(e,cat,idx)=>{e.dataTransfer.setData('wish',JSON.stringify({cat,idx}));e.currentTarget.classList.add('dragging');};
window.onDragEnd=e=>{e.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));};

window.onSlotDrop=(e,slotIdx)=>{
  e.preventDefault();e.currentTarget.classList.remove('drag-over');e.currentTarget.classList.remove('drag-over-inner');
  if(!D.puzzle.slots[slotIdx].cards)D.puzzle.slots[slotIdx].cards=[];
  const poolData=e.dataTransfer.getData('pool');
  const wishData=e.dataTransfer.getData('wish');
  const cardData=e.dataTransfer.getData('card');
  if(cardData){
    const{slotIdx:fromSlot,ci}=JSON.parse(cardData);
    if(fromSlot===slotIdx)return;
    const card=D.puzzle.slots[fromSlot].cards.splice(ci,1)[0];
    D.puzzle.slots[slotIdx].cards.push(card);
    save();render();
  } else if(poolData){
    const ev=JSON.parse(poolData);
    D.puzzle.slots[slotIdx].cards.push({type:'plan',name:ev.name,time:ev.time,addr:'',note:ev.note||'',cardTime:''});
    save();render();
  } else if(wishData){
    const{cat,idx}=JSON.parse(wishData);
    const w=D.wishlist[cat][idx];
    D.puzzle.slots[slotIdx].cards.push({type:cat,name:w.name,addr:w.addr||'',note:w.note||'',cardTime:'',nights:w.nights||'',rooms:w.rooms||'',price:w.price||'',metro:w.metro||'',hours:w.hours||'',gmaps:w.gmaps||''});
    D.wishlist[cat].splice(idx,1);
    save();render();
  }
};

// 退回卡片池（願望清單類型加回wishlist，行程類型直接消失出現在卡片池）
window.returnCard=(slotIdx,ci)=>{
  const card=D.puzzle.slots[slotIdx].cards[ci];
  if(card.type&&WCAT[card.type]){
    if(!D.wishlist[card.type])D.wishlist[card.type]=[];
    const item={name:card.name,addr:card.addr||'',note:card.note||'',metro:card.metro||'',hours:card.hours||'',gmaps:card.gmaps||''};
    if(card.type==='stay'){if(card.nights)item.nights=card.nights;if(card.rooms)item.rooms=card.rooms;if(card.price)item.price=card.price;}
    D.wishlist[card.type].push(item);
  }
  D.puzzle.slots[slotIdx].cards.splice(ci,1);
  save();render();
};
// 卡片拖拉（卡片之間移動）
window.onCardDragStart=(e,slotIdx,ci)=>{
  e.dataTransfer.setData('card',JSON.stringify({slotIdx,ci}));
  e.currentTarget.classList.add('dragging');
};
// 卡片時間
window.editCardTime=(slotIdx,ci)=>{UI.editCardTime=slotIdx+'-'+ci;render()};
window.cancelCardTime=()=>{UI.editCardTime=null;render()};
window.saveCardTime=(slotIdx,ci)=>{
  const t=getSlotVal('ct-'+slotIdx+'-'+ci);
  if(t)D.puzzle.slots[slotIdx].cards[ci].cardTime=t;
  UI.editCardTime=null;save();render();
};
window.togPool=k=>{if(!UI.poolOpen)UI.poolOpen={};UI.poolOpen[k]=!UI.poolOpen[k];render()};
window.showAddSlot=di=>{UI.addSlotDay=di;UI.insertBefore=null;render()};
window.cancelAddSlot=()=>{UI.addSlotDay=null;render()};
window.addPbSlot=di=>{
  const t=getSlotVal('ns-time-'+di);if(!t)return;
  D.puzzle.slots.push({dayIdx:di,time:t,label:t,cards:[]});
  UI.addSlotDay=null;save();render();
};
window.showInsertBefore=slotIdx=>{UI.insertBefore=slotIdx;UI.addSlotDay=null;UI.editSlotTime=null;render()};
window.cancelInsert=()=>{UI.insertBefore=null;render()};
window.insertPbSlot=slotIdx=>{
  const t=getSlotVal('ins-time-'+slotIdx);if(!t)return;
  const slot=D.puzzle.slots[slotIdx];
  D.puzzle.slots.splice(slotIdx,0,{dayIdx:slot.dayIdx,time:t,label:t,cards:[]});
  UI.insertBefore=null;save();render();
};
window.editSlotTime=slotIdx=>{UI.editSlotTime=slotIdx;UI.insertBefore=null;UI.addSlotDay=null;render()};
window.cancelSlotTimeEdit=()=>{UI.editSlotTime=null;render()};
window.saveSlotTime=slotIdx=>{
  const labelEl=document.getElementById('et-label-'+slotIdx);
  if(labelEl&&labelEl.value.trim())D.puzzle.slots[slotIdx].label=labelEl.value.trim();
  const t=getSlotVal('et-'+slotIdx);
  if(t)D.puzzle.slots[slotIdx].exactTime=t;
  UI.editSlotTime=null;save();render();
};
window.delPbSlot=slotIdx=>{D.puzzle.slots.splice(slotIdx,1);UI.editSlotTime=null;save();render()};

window.togTipAdd=()=>{UI.showTipAdd=!UI.showTipAdd;render()};
window.addTip=()=>{const i=document.getElementById('tip-icon').value.trim()||'💡';const t=document.getElementById('tip-title').value.trim();const d=document.getElementById('tip-desc').value.trim();const cat=document.getElementById('tip-cat-in').value.trim()||'📌 自訂';if(!t)return;let grp=D.tips.find(g=>g.cat===cat);if(!grp){grp={cat,items:[]};D.tips.push(grp);}grp.items.push({i,t,d});UI.showTipAdd=false;save();render();};
window.editTip=(gi,ti)=>{UI.editTip=gi+'-'+ti;render()};
window.cancelTipEdit=()=>{UI.editTip=null;render()};
window.saveTip=(gi,ti)=>{const i=document.getElementById('etip-icon').value.trim();const t=document.getElementById('etip-title').value.trim();const d=document.getElementById('etip-desc').value.trim();if(!t)return;D.tips[gi].items[ti]={...D.tips[gi].items[ti],i,t,d};UI.editTip=null;save();render();};
window.delTip=(gi,ti)=>{D.tips[gi].items.splice(ti,1);if(D.tips[gi].items.length===0)D.tips.splice(gi,1);UI.editTip=null;save();render();};

window.togItem=(cat,idx)=>{D.luggage[cat][idx].c=!D.luggage[cat][idx].c;save();render()};
window.editItem=(cat,idx)=>{UI.editItem=cat+'-'+idx;render()};
window.cancelItemEdit=()=>{UI.editItem=null;render()};
window.saveItem=(cat,idx)=>{const v=document.getElementById('ei-label').value.trim();if(!v)return;D.luggage[cat][idx].l=v;UI.editItem=null;save();render();};
window.delItem=(cat,idx)=>{D.luggage[cat].splice(idx,1);if(D.luggage[cat].length===0)delete D.luggage[cat];UI.editItem=null;save();render();};
window.addItem=()=>{const el=document.getElementById('new-item');const v=el.value.trim();if(!v)return;if(!D.luggage['自訂物品 ⭐'])D.luggage['自訂物品 ⭐']=[];D.luggage['自訂物品 ⭐'].push({l:v,t:'',c:false});save();render();};
window.editInfo=k=>{UI.editInfo=k;render();setTimeout(()=>{const el=document.getElementById('if-'+k);if(el){el.focus();el.select();}},30);};
window.saveInfo=k=>{const el=document.getElementById('if-'+k);if(el){if(!D.info)D.info={};D.info[k]=el.value.trim();}UI.editInfo=null;save();render();};
</script>
</body>
</html>
